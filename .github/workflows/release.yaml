name: release

on:
  push:
    tags:
    - 'v*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check git tag
      run: |
        GIT_VERSION="${GITHUB_REF_NAME}"
        FILE_VERSION=$(cat VERSION)
        if [ "$GIT_VERSION" != "$FILE_VERSION" ]; then
          echo "::error::Tag $GIT_VERSION does not match VERSION file ($FILE_VERSION)"
          exit 1
        fi

  release:
    runs-on: ubuntu-latest
    needs: [docker, helm]
    steps:
    # Fetch full history so that we can find the previous git tag.
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create or update release
      run: |
        # Create a release, with generated notes starting from the previous tag.
        PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
        NOTES_ARGS="--generate-notes"
        PREV_COMMIT_ARG=""
        if [ -n "$PREV" ]; then
          NOTES_ARGS="$NOTES_ARGS --notes-start-tag $PREV"
          PREV_COMMIT_ARG="-f previous_tag_name=$PREV"
        fi
        if gh release view ${{ github.ref_name }} > /dev/null 2>&1; then
          BODY=$(gh api -X POST "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" $PREV_COMMIT_ARG \
            -q .body)
          gh release edit ${{ github.ref_name }} --notes "$BODY"
        else
          gh release create ${{ github.ref_name }} \
            $NOTES_ARGS
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: [check-version]
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: build and push
      run: |
        RELEASE=true make push

  helm:
    runs-on: ubuntu-latest
    needs: [check-version, docker]
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: build and push
      run: |
        make helm-package
        make helm-push
