---
on:
  pull_request: {}

name: Lint & Format

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Cache golangci-lint analysis
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('tools/go.sum', '.golangci.yaml', 'go.mod') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-

      - name: Lint
        run: make lint

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Cache golangci-lint analysis
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('tools/go.sum', '.golangci.yaml', 'go.mod') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-

      - name: Format
        run: make fmt

      - name: Check for Changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Code is not formatted. Run 'make fmt' and commit the result."
            exit 1
          fi
